# doctoroxide.toml — Performance analysis configuration
#
# Generated by `doctoroxide init`. Uncomment and modify sections as needed.
# Docs: https://github.com/doctoroxide/doctoroxide

# Analysis layers to enable.
# Available: static, compiler, profiling, llm, enrichment, all
[analysis]
layers = ["static"]

# Git-history enrichment such as churn-based file hotspots.
[enrichment]
enabled = false

# Rules and files to ignore.
[ignore]
# rules = ["ALLOC-008"]
# files = ["tests/**", "benches/**"]

# CI integration settings.
# [ci]
# fail_on_score_below = 70
# fail_on_severity = "error"
# fail_on_new_findings = true

# ─────────────────────────────────────────────────────────────────
# Per-rule configuration overrides
#
# Uncomment a [rules.<ID>] section to override that rule's defaults.
# Available fields:
#   severity = "info" | "warning" | "error"
#   weight   = <number>  (higher = more impact on score)
#   enabled  = true | false
# ─────────────────────────────────────────────────────────────────

# ── COMPUTE ──

# COMPUTE-001 — Auto-vectorisation Blocker
# detects loop patterns that prevent LLVM auto-vectorisation (Layer 1 heuristic)
# [rules.COMPUTE-001]
# severity = "warning"
# weight = 3.0
# enabled = true

# COMPUTE-002 — Indexing Loop Over Iterator
# detects indexing loops that could use iterators to eliminate bounds checks
# [rules.COMPUTE-002]
# severity = "warning"
# weight = 3.0
# enabled = true

# COMPUTE-003 — Missing Inline on Small Cross-Crate Function
# detects small pub functions without #[inline] that could benefit from cross-crate inlining
# [rules.COMPUTE-003]
# severity = "info"
# weight = 2.0
# enabled = true

# COMPUTE-004 — Regex in Loop
# detects regex compilation inside loop bodies
# [rules.COMPUTE-004]
# severity = "warning"
# weight = 5.0
# enabled = true

# COMPUTE-005 — Const-Eligible Function
# detects functions that could be const fn for compile-time evaluation
# [rules.COMPUTE-005]
# severity = "info"
# weight = 1.0
# enabled = true

# COMPUTE-006 — High Cyclomatic Complexity
# detects functions with many independent control-flow paths
# [rules.COMPUTE-006]
# severity = "warning"
# weight = 2.0
# enabled = true

# COMPUTE-007 — Sequential Awaits on Independent Futures
# detects consecutive .await expressions where the futures do not depend on each other and could run concurrently
# [rules.COMPUTE-007]
# severity = "info"
# weight = 2.0
# enabled = true

# ── CONCURRENCY ──

# CONC-001 — SeqCst When Weaker Ordering Suffices
# flags Ordering::SeqCst on atomic operations where weaker ordering may suffice
# [rules.CONC-001]
# severity = "info"
# weight = 1.0
# enabled = true

# CONC-002 — Mutex on Read-Heavy Data
# detects Mutex locks used exclusively for reading, where RwLock would allow concurrency
# [rules.CONC-002]
# severity = "info"
# weight = 3.0
# enabled = true

# CONC-003 — Arc<Mutex<HashMap>> Pattern
# detects Arc<Mutex<HashMap>> where a concurrent map would avoid global lock contention
# [rules.CONC-003]
# severity = "info"
# weight = 3.0
# enabled = true

# CONC-004 — Large Async Future
# detects async functions with large captured state that produce oversized futures
# [rules.CONC-004]
# severity = "warning"
# weight = 2.0
# enabled = true

# CONC-005 — Thread Spawn in Loop
# detects std::thread::spawn() called inside loop bodies
# [rules.CONC-005]
# severity = "warning"
# weight = 5.0
# enabled = true

# ── IO ──

# IO-001 — Unbuffered File I/O
# detects File read/write operations without BufReader/BufWriter wrapping
# [rules.IO-001]
# severity = "warning"
# weight = 4.0
# enabled = true

# IO-002 — Small Buffer Capacity
# detects BufReader/BufWriter using default 8KB buffer where with_capacity() may improve throughput
# [rules.IO-002]
# severity = "info"
# weight = 2.0
# enabled = true

# IO-003 — Repeated File Open in Loop
# detects File::open/create or fs::read/write called inside loop bodies
# [rules.IO-003]
# severity = "warning"
# weight = 5.0
# enabled = true

# ── LAYOUT ──

# LAYOUT-001 — Excessive Struct Padding
# detects structs where field reordering would save significant padding bytes
# [rules.LAYOUT-001]
# severity = "info"
# weight = 3.0
# enabled = true

# LAYOUT-002 — Struct Exceeds Cache Line
# detects structs whose total size exceeds 64 bytes (one cache line)
# [rules.LAYOUT-002]
# severity = "info"
# weight = 2.0
# enabled = true

# LAYOUT-004 — Niche Optimisation Missed
# detects Option<T> where T is a primitive integer that could use NonZero for niche optimisation, reducing size by the alignment of T
# [rules.LAYOUT-004]
# severity = "info"
# weight = 2.0
# enabled = true

# LAYOUT-005 — Large Enum Variant
# detects enums with one variant significantly larger than others, wasting memory
# [rules.LAYOUT-005]
# severity = "warning"
# weight = 4.0
# enabled = true

# ── MEMORY ──

# ALLOC-001 — Clone in Loop
# detects .clone() calls inside loop bodies that allocate per iteration
# [rules.ALLOC-001]
# severity = "warning"
# weight = 4.0
# enabled = true

# ALLOC-002 — Format/ToString in Loop
# detects format!(), .to_string(), and .to_owned() inside loop bodies that allocate per iteration
# [rules.ALLOC-002]
# severity = "warning"
# weight = 3.0
# enabled = true

# ALLOC-003 — Vec Without Capacity
# detects Vec::new() followed by push in a for loop where with_capacity() would avoid reallocations
# [rules.ALLOC-003]
# severity = "warning"
# weight = 3.0
# enabled = true

# ALLOC-004 — String Parameter Instead of &str
# detects function parameters of type String where &str would avoid forcing callers to allocate
# [rules.ALLOC-004]
# severity = "warning"
# weight = 2.0
# enabled = true

# ALLOC-005 — Vec Parameter Instead of &[T]
# detects function parameters of type Vec<T> where &[T] would avoid forcing callers to allocate
# [rules.ALLOC-005]
# severity = "warning"
# weight = 2.0
# enabled = true

# ALLOC-006 — Intermediate Collect
# detects unnecessary .collect::<Vec<_>>() that immediately feeds into another iteration
# [rules.ALLOC-006]
# severity = "info"
# weight = 2.0
# enabled = true

# ALLOC-007 — Box of Small Type
# detects Box<T> where T fits in CPU registers, making heap allocation unnecessary
# [rules.ALLOC-007]
# severity = "warning"
# weight = 3.0
# enabled = true

# ALLOC-008 — HashMap for Small N
# detects HashMap/BTreeMap with small deterministic entry count where simpler structures suffice
# [rules.ALLOC-008]
# severity = "info"
# weight = 1.0
# enabled = true

# ── SECURITY ──

# SEC-001 — Hardcoded Secret in Source
# detects string literals matching API key, token, or password patterns in source code
# [rules.SEC-001]
# severity = "warning"
# weight = 6.0
# enabled = true

# ── TYPES ──

# TYPE-001 — Dynamic Dispatch in Hot Path
# detects dyn Trait method calls in loops where vtable indirection prevents inlining
# [rules.TYPE-001]
# severity = "warning"
# weight = 3.0
# enabled = true

# TYPE-003 — Unnecessary Box<dyn Error>
# detects functions returning Box<dyn Error> where concrete error types are preferable
# [rules.TYPE-003]
# severity = "info"
# weight = 2.0
# enabled = true
