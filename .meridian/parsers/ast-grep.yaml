name: ast-grep
format: json
schema: |
  {
    "type": "array",
    "items": {
      "type": "object",
      "properties": {
        "ruleId": {"type": "string"},
        "severity": {"type": "string"},
        "message": {"type": "string"},
        "file": {"type": "string"},
        "note": {"type": "string"},
        "range": {
          "type": "object",
          "properties": {
            "start": {
              "type": "object",
              "properties": {
                "line": {"type": "integer"},
                "column": {"type": "integer"}
              }
            }
          }
        }
      }
    }
  }
return:
  findings: data
  finding_count: count(data)
  warnings: data where severity == "warning"
  warning_count: count(data where severity == "warning")
  hints: data where severity == "hint"
  hint_count: count(data where severity == "hint")
