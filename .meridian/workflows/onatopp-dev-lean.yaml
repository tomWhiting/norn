name: onatopp-dev-lean
description: |
  Lean development cycle. Three action steps: Scout+Plan, Dev, Review+Harden
  (merged). Run-checks-triaged after Dev gates the review. No separate
  harden step — the reviewer handles alignment, deferred lints, and
  acceptance verification in a single pass.

input:
  brief:
    type: text
    required: true
    description: "Brief JSON (schema: .meridian/design-system/schemas/brief.schema.json)."
  design_content:
    type: text
    required: false
    description: Design document content (pass via --input "design_content=$(cat path/to/DESIGN.md)").
  checklist_content:
    type: text
    required: false
    description: Checklist JSON content for C-number resolution (pass via --input "checklist_content=$(cat path/to/checklist.json)").
  stories_content:
    type: text
    required: false
    description: Stories JSON content for S-number resolution (pass via --input "stories_content=$(cat path/to/stories.json)").
  notify:
    type: text
    required: false
    description: Member name to notify on completion.
  run-name:
    type: text
    required: false
    description: 'Label for the notification DM (e.g. "brief M-002").'

steps:
  # ═══════════════════════════════════════════════════════════════════════════
  # SCOUT AND PLAN
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Scout and Plan
    kind: action
    target: function
    profile: codebase-explorer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string", "description": "2-3 sentences orienting the implementer."},
          "enrichments": {
            "type": "array",
            "description": "One entry per R# — codebase context for the implementer.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "R# id from the brief"},
                "related_files": {"type": "array", "items": {"type": "string"}, "description": "Existing files relevant to this R# (path + brief note on why)"},
                "context": {"type": "array", "items": {"type": "string"}, "description": "Key findings: sibling conventions, type signatures, module layout"},
                "references": {"type": "array", "items": {"type": "string"}, "description": "Files to reference during implementation (path:line-range)"}
              },
              "required": ["id", "related_files", "context", "references"]
            }
          },
          "tasks": {
            "type": "array",
            "description": "Ordered implementation tasks. Specific enough for another agent to execute without questions.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "Sequential: 1, 2, 3..."},
                "subject": {"type": "string", "description": "Short task title (imperative, under 80 chars)."},
                "description": {"type": "string", "description": "Specific enough to execute without questions."},
                "activeForm": {"type": "string", "description": "Present continuous for spinner."},
                "status": {"type": "string", "enum": ["pending"]},
                "blocks": {"type": "array", "items": {"type": "string"}},
                "blockedBy": {"type": "array", "items": {"type": "string"}}
              },
              "required": ["id", "subject", "description", "activeForm", "status", "blocks", "blockedBy"]
            }
          },
          "verification_items": {
            "type": "array",
            "items": {"type": "string"},
            "description": "Concrete checks the developer should run to verify their work."
          }
        },
        "required": ["summary", "enrichments", "tasks", "verification_items"]
      }
    prompt: |
      Explore the codebase and plan the implementation for this brief. You are read-only — do not modify files.

      PHASE 1 — SCOUT: For each R#, find related files, conventions, type signatures, and specific file:line-range references the implementer should look at.

      PHASE 2 — PLAN: Using the context you just gathered, produce ordered implementation tasks. Be specific — another agent executes these without asking questions. Also produce verification_items: concrete checks to run after implementation.

      <documents>
      {?input.design_content}
      <document index="1">
        <source>design_document</source>
        <document_content>
      {input.design_content}
        </document_content>
      </document>
      {/}
      <document index="2">
        <source>brief</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      Files to create: {r.files.create[*]}
      Files to modify: {r.files.modify[*]}
      {?r.files.delete}Files to delete: {r.files.delete[*]}{/}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}

      {?r.checklist}Checklist items: {r.checklist[*]}{/}
      {?r.stories}User stories: {r.stories[*]}{/}
      </requirement>
      {/each}

      ## Boundaries

      {#each input.brief.boundaries as b}
      - {b}
      {/each}

      ## Verification

      {#each input.brief.verification as v}
      - {v}
      {/each}
        </document_content>
      </document>
      </documents>
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Create Tasks
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # CREATE TASKS
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Create Tasks
    kind: execute
    command: |
      TASK_DIR="$HOME/.claude/tasks/{input.brief.id}"
      rm -rf "$TASK_DIR"
      mkdir -p "$TASK_DIR"
      TMPJSON=$(mktemp)
      cat > "$TMPJSON" <<'__YGG_TASKS_END__'
      {raw:Scout and Plan.tasks}
      __YGG_TASKS_END__
      TOTAL=$(jq length "$TMPJSON")
      for i in $(seq 0 $((TOTAL - 1))); do
        ID=$(jq -r ".[$i].id" "$TMPJSON")
        jq ".[$i]" "$TMPJSON" > "$TASK_DIR/$ID.json"
      done
      rm -f "$TMPJSON"
      echo "Created $TOTAL tasks"
    parser: lines
    routes:
      success: Dev
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Dev
    kind: action
    target: function
    profile: workflow-developer
    task_list_id: "{input.brief.id}"
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string", "description": "1-2 sentences on what was done."},
          "commit_message": {"type": "string", "description": "Conventional-commits style."},
          "enrichments": {
            "type": "array",
            "description": "One entry per R# — how it was implemented.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string", "description": "R# id"},
                "status": {"type": "string", "enum": ["implemented", "blocked"]},
                "files_changed": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": {
                      "path": {"type": "string"},
                      "change": {"type": "string", "enum": ["created", "modified", "deleted"]},
                      "note": {"type": "string"}
                    },
                    "required": ["path", "change", "note"]
                  }
                },
                "how_satisfied": {"type": "string", "description": "How this requirement was met."},
                "deviation": {"type": "string", "description": "Empty if followed plan. Otherwise: what changed and why."},
                "checklist_status": {"type": "array", "items": {"type": "object", "properties": {"id": {"type": "string"}, "done": {"type": "boolean"}, "note": {"type": "string"}}, "required": ["id", "done", "note"]}},
                "stories_status": {"type": "array", "items": {"type": "object", "properties": {"id": {"type": "string"}, "satisfied": {"type": "boolean"}, "note": {"type": "string"}}, "required": ["id", "satisfied", "note"]}}
              },
              "required": ["id", "status", "files_changed", "how_satisfied", "deviation", "checklist_status", "stories_status"]
            }
          },
          "attestation": {
            "type": "object",
            "description": "Behavior bond — certify clean implementation.",
            "properties": {
              "no_panics": {"type": "boolean", "description": "No unwrap/expect/panic/todo in library code."},
              "no_unsafe": {"type": "boolean", "description": "No unsafe blocks added."},
              "boundaries_respected": {"type": "boolean", "description": "All SHALL NOT boundaries observed."},
              "tests_considered": {"type": "boolean", "description": "Tests added or existing tests still pass."}
            },
            "required": ["no_panics", "no_unsafe", "boundaries_respected", "tests_considered"]
          }
        },
        "required": ["summary", "commit_message", "enrichments", "attestation"]
      }
    prompt: |
      {?Run Checks.pass == false}
      CHECKS FAILED — fix only the specific failures below. Do not extend scope.

      {Run Checks.failure_report}
      {/}

      {?@resume == false}
      Implement the brief. Your task list has been populated — use TaskList to see tasks.

      <documents>
      {?input.design_content}
      <document index="1">
        <source>design_document</source>
        <document_content>
      {input.design_content}
        </document_content>
      </document>
      {/}
      <document index="2">
        <source>brief</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements (enriched with codebase context)

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      {?r.related_files}**Related files:** {r.related_files[*]}{/}
      {?r.context}**Context:** {r.context[*]}{/}
      {?r.references}**References:** {r.references[*]}{/}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}

      {?r.checklist}Checklist items: {r.checklist[*]}{/}
      {?r.stories}User stories: {r.stories[*]}{/}
      </requirement>
      {/each}

      ## Boundaries

      {#each input.brief.boundaries as b}
      - {b}
      {/each}
        </document_content>
      </document>
      {?input.checklist_content}
      <document index="3">
        <source>checklist_reference</source>
        <document_content>
      {#each input.checklist_content.sections as s}
      **{s.name}:**
      {#each s.items as item}
      - {item.id}: {item.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      {?input.stories_content}
      <document index="4">
        <source>stories_reference</source>
        <document_content>
      {#each input.stories_content.personas as p}
      **{p.name} — {p.role}:**
      {#each p.stories as story}
      - {story.id}: {story.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      <document index="5">
        <source>verification_items</source>
        <document_content>
      {#each Scout and Plan.verification_items as v}
      - {v}
      {/each}
        </document_content>
      </document>
      <document index="6">
        <source>scout_summary</source>
        <document_content>
      {Scout and Plan.summary}
        </document_content>
      </document>
      </documents>

      ---

      For each R#, report: status, files changed (with notes), how satisfied, any deviation from plan. For each checklist item (C#) and user story (S#) assigned to the R#, report whether it was delivered.

      Before submitting, attest: no panics/unwraps in library code, no unsafe, boundaries respected, tests considered.
      {/}
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Commit and Fix
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMIT + FIX
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Commit and Fix
    kind: execute
    command: |
      UNSTAGED=$(git diff --name-only)
      UNTRACKED=$(git ls-files --others --exclude-standard)
      ALL_CHANGED="$UNSTAGED $UNTRACKED"
      CRATES=$(echo "$ALL_CHANGED" | tr ' ' '\n' | grep '^crates/.*\.rs$' | cut -d/ -f1-2 | sort -u | while read dir; do
        if [ -f "$dir/Cargo.toml" ]; then
          grep '^name' "$dir/Cargo.toml" | head -1 | sed 's/name *= *"//;s/"//g'
        fi
      done | sort -u | tr '\n' ' ')
      if [ -z "$(echo "$ALL_CHANGED" | tr -d '[:space:]')" ]; then
        printf '{"committed":false,"crates_affected":"","changed_files":""}\n'
      else
        if [ -n "$CRATES" ]; then
          cargo clippy --all-targets --fix --allow-dirty --allow-staged $(printf -- '-p %s ' $CRATES) -- -D warnings 2>&1 || true
          cargo fmt --workspace 2>&1
        fi
        git add -A
        COMMIT_MSG_FILE=$(mktemp)
        cat > "$COMMIT_MSG_FILE" <<'__YGG_COMMIT_MSG__'
      {raw:Dev.commit_message}
      __YGG_COMMIT_MSG__
        git commit -F "$COMMIT_MSG_FILE" --no-verify 2>&1 || true
        rm -f "$COMMIT_MSG_FILE"
        CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null | tr '\n' ' ')
        printf '{"committed":true,"crates_affected":"%s","changed_files":"%s"}\n' "$CRATES" "$CHANGED_FILES"
      fi
    parser: json
    routes:
      success: Run Checks
      failure: Run Checks

  # ═══════════════════════════════════════════════════════════════════════════
  # RUN CHECKS
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Run Checks
    kind: dispatch
    workflow: run-checks-triaged
    inputs:
      scope: dev
      crates_affected: "{Commit and Fix.data.crates_affected}"
      changed_files: "{Commit and Fix.data.changed_files}"
    routes:
      success: Review and Harden
      failure: Dev

  # ═══════════════════════════════════════════════════════════════════════════
  # REVIEW AND HARDEN — single pass: alignment + deferred lints + acceptance
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Review and Harden
    kind: action
    target: function
    profile: reviewer
    output_schema: |
      {
        "type": "object",
        "properties": {
          "summary": {"type": "string"},
          "commit_message": {"type": "string"},
          "pass": {"type": "boolean", "description": "True if all criteria met and no blocking issues remain."},
          "enrichments": {
            "type": "array",
            "description": "One entry per R# — combined review and hardening verdict.",
            "items": {
              "type": "object",
              "properties": {
                "id": {"type": "string"},
                "alignment": {"type": "string", "enum": ["aligned", "drifted", "fixed"], "description": "Does the implementation match the design intent?"},
                "acceptance_met": {"type": "boolean"},
                "checklist_ticked": {"type": "array", "items": {"type": "string"}},
                "stories_satisfied": {"type": "array", "items": {"type": "string"}},
                "issues": {"type": "array", "items": {"type": "string"}},
                "fixes_applied": {"type": "array", "items": {"type": "string"}}
              },
              "required": ["id", "alignment", "acceptance_met", "checklist_ticked", "stories_satisfied", "issues", "fixes_applied"]
            }
          },
          "verification_results": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "criterion": {"type": "string"},
                "passed": {"type": "boolean"},
                "note": {"type": "string"}
              },
              "required": ["criterion", "passed", "note"]
            }
          }
        },
        "required": ["summary", "commit_message", "pass", "enrichments", "verification_results"]
      }
    prompt: |
      {?@resume == false}
      Review and harden the implementation in a single pass. You have two jobs:

      JOB 1 — HARDEN: Verify that what was built matches the design philosophy, naming conventions, error handling patterns, and outcomes the design demands. Fix anything that drifts.

      {?Run Checks.deferred_clippy_report}
      DEFERRED CLIPPY LINTS — style and performance issues that were not blocking but need fixing. Address each one:

      {Run Checks.deferred_clippy_report}
      {/}

      JOB 2 — REVIEW: Verify acceptance criteria for each R#. Tick off checklist items. Confirm user stories addressed. Run what you can, grep what you can, check what's checkable. Then verify every top-level verification criterion.

      <documents>
      {?input.design_content}
      <document index="1">
        <source>design_document</source>
        <document_content>
      {input.design_content}
        </document_content>
      </document>
      {/}
      <document index="2">
        <source>brief</source>
        <document_content>
      # {input.brief.id}: {input.brief.title}

      ## Purpose

      {input.brief.purpose}

      ## Task

      {input.brief.task}

      ## Requirements (fully enriched — scout context + dev implementation)

      {#each input.brief.requirements as r}
      <requirement id="{r.id}">
      ### {r.id}: {r.title}

      {r.spec}

      {?r.related_files}**Related files:** {r.related_files[*]}{/}
      {?r.context}**Context:** {r.context[*]}{/}
      {?r.references}**References:** {r.references[*]}{/}
      {?r.how_satisfied}**Dev implementation:** {r.how_satisfied}{/}
      {?r.files_changed}**Files changed:**
      {#each r.files_changed as f}
      - {f.path} ({f.change}): {f.note}
      {/each}{/}
      {?r.deviation}**Deviation:** {r.deviation}{/}

      Acceptance:
      {#each r.acceptance as a}
      - {a}
      {/each}

      {?r.checklist}Checklist items: {r.checklist[*]}{/}
      {?r.stories}User stories: {r.stories[*]}{/}
      {?r.checklist_status}**Dev checklist status:**
      {#each r.checklist_status as c}
      - {c.id}: {c.note} (done: {c.done})
      {/each}{/}
      {?r.stories_status}**Dev stories status:**
      {#each r.stories_status as s}
      - {s.id}: {s.note} (satisfied: {s.satisfied})
      {/each}{/}
      </requirement>
      {/each}

      ## Boundaries

      {#each input.brief.boundaries as b}
      - {b}
      {/each}
        </document_content>
      </document>
      {?input.checklist_content}
      <document index="3">
        <source>checklist_reference</source>
        <document_content>
      {#each input.checklist_content.sections as s}
      **{s.name}:**
      {#each s.items as item}
      - {item.id}: {item.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      {?input.stories_content}
      <document index="4">
        <source>stories_reference</source>
        <document_content>
      {#each input.stories_content.personas as p}
      **{p.name} — {p.role}:**
      {#each p.stories as story}
      - {story.id}: {story.text}
      {/each}
      {/each}
        </document_content>
      </document>
      {/}
      <document index="5">
        <source>dev_attestation</source>
        <document_content>
      {?Dev.attestation}panics={Dev.attestation.no_panics}, unsafe={Dev.attestation.no_unsafe}, boundaries={Dev.attestation.boundaries_respected}, tests={Dev.attestation.tests_considered}{/}
        </document_content>
      </document>
      <document index="6">
        <source>verification_criteria</source>
        <document_content>
      {#each input.brief.verification as v}
      - {v}
      {/each}
      {#each Scout and Plan.verification_items as v}
      - {v}
      {/each}
        </document_content>
      </document>
      </documents>

      ---

      For each R#: assess alignment (aligned/drifted/fixed), verify acceptance criteria, tick checklist items, confirm stories. List issues found and fixes applied.

      Set pass=true only if all acceptance criteria are met and no blocking issues remain.
      {/}
    merge:
      from: enrichments
      into: input.brief.requirements
      key: id
    routes:
      success: Commit Review
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMIT REVIEW
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Commit Review
    kind: execute
    command: |
      UNSTAGED=$(git diff --name-only)
      UNTRACKED=$(git ls-files --others --exclude-standard)
      ALL_CHANGED="$UNSTAGED $UNTRACKED"
      if [ -z "$(echo "$ALL_CHANGED" | tr -d '[:space:]')" ]; then
        echo '{"committed":false}'
      else
        git add -A
        COMMIT_MSG_FILE=$(mktemp)
        cat > "$COMMIT_MSG_FILE" <<'__YGG_COMMIT_MSG__'
      {raw:Review and Harden.commit_message}
      __YGG_COMMIT_MSG__
        git commit -F "$COMMIT_MSG_FILE" --no-verify 2>&1 || true
        rm -f "$COMMIT_MSG_FILE"
        echo '{"committed":true}'
      fi
    parser: json
    routes:
      success: Done
      failure: Done

  # ═══════════════════════════════════════════════════════════════════════════
  # DONE + NOTIFY
  # ═══════════════════════════════════════════════════════════════════════════

  - name: Done
    kind: execute
    command: |
      echo "Workflow complete: {input.brief.id} — {input.brief.title}"
    parser: exit-code
    routes:
      success: Notify
      failure: Notify

  - name: Notify
    kind: execute
    command: |
      MEMBER="{input.notify}"
      if [ -n "$MEMBER" ]; then
        RUN_NAME="{input.run-name}"
        BRIEF_ID="{input.brief.id}"
        MSG=$(cat <<'__MSG_END__'
      onatopp-dev-lean complete: {input.brief.id} — {input.brief.title}
      {?Dev.summary}Dev: {Dev.summary}{/}
      {?Review and Harden.summary}Review: {Review and Harden.summary}{/}
      __MSG_END__
      )
        collective send --as "Meridian" --to "$MEMBER" --subject "workflow complete: ${RUN_NAME:-$BRIEF_ID}" --message "$MSG" || true
      fi
      echo "Done"
    parser: exit-code
    routes:
      success: End
      failure: End

  - name: End
    kind: end
