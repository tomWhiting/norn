# CONVENTIONS.toml — post-mutation check configuration for Norn.
#
# Workspace conventions are loaded through Norn's non-executing trust boundary:
# only declarative patterns and LOC checks survive. Process-backed diagnostics and
# remediation declarations (including clippy and rustfmt) are stripped, so they
# must not be declared here as if they run. The repository gate runs
# `cargo clippy --workspace --all-targets -- -D warnings` and
# `cargo fmt --all -- --check` separately.
#
# Rules activate the surviving checks after write / edit / apply_patch mutations
# and again at stop. `handling = "block"` emits a validation failure. Mutations
# have already landed when this post-check runs, so stop-time repetition prevents
# an unresolved hard finding from being mistaken for successful completion.
# Generated by `norn init conventions`; review deliberately before broad use.

# Language definitions: bundled templates for detected source languages.
[rust.patterns]
allow-attr = { matcher = "ast", pattern = '(attribute_item (attribute (identifier) @name (#eq? @name "allow"))) @bypass (inner_attribute_item (attribute (identifier) @name (#eq? @name "allow"))) @bypass', handling = "block", feedback = "A lint allowance silences the check without fixing the code. Address the underlying issue instead of adding an allowance." }
expect-attr = { matcher = "ast", pattern = '(attribute_item (attribute (identifier) @name (#eq? @name "expect"))) @bypass (inner_attribute_item (attribute (identifier) @name (#eq? @name "expect"))) @bypass', handling = "block", feedback = "A lint expectation is still a suppression. Fix the underlying lint instead of encoding an expected warning." }
deny-attr = { matcher = "ast", pattern = '(attribute_item (attribute (identifier) @name (#eq? @name "deny"))) @bypass (inner_attribute_item (attribute (identifier) @name (#eq? @name "deny"))) @bypass', handling = "block", feedback = "Source-level lint policy overrides are not permitted. Keep lint authority in the workspace policy and fix the code." }
cfg-any = { matcher = "ast", pattern = '(attribute_item (attribute (identifier) @name (#eq? @name "cfg") arguments: (token_tree (identifier) @predicate (#eq? @predicate "any") (token_tree) @arguments (#eq? @arguments "()")))) @bypass (inner_attribute_item (attribute (identifier) @name (#eq? @name "cfg") arguments: (token_tree (identifier) @predicate (#eq? @predicate "any") (token_tree) @arguments (#eq? @arguments "()")))) @bypass', handling = "block", feedback = "An empty cfg(any()) predicate disables code instead of resolving it. Use a real supported configuration or remove the dead code." }
ignore-attr = { matcher = "ast", pattern = '(attribute_item (attribute (identifier) @name (#eq? @name "ignore"))) @bypass', handling = "block", feedback = "An ignored test is not evidence. Fix or delete it; external-service tests must use an explicit runtime gate." }
silent-var-rename = { matcher = "ast", pattern = '(parameter pattern: (identifier) @name (#match? @name "^_[a-zA-Z]")) @bypass (let_declaration pattern: (identifier) @name (#match? @name "^_[a-zA-Z]")) @bypass', handling = "block", feedback = "A named underscore binding may not be used to silence an unused-value lint. Use the value, change the contract, or remove the binding." }
fallible-shortcuts = { matcher = "ast", pattern = '(call_expression function: (field_expression field: (field_identifier) @method (#match? @method "^(unwrap|unwrap_err|expect|expect_err)$"))) @bypass', handling = "block", feedback = "Handle the fallible result explicitly or propagate it with a typed error instead of using a panic shortcut." }
panic-macros = { matcher = "ast", pattern = '(macro_invocation macro: [(identifier) @macro (scoped_identifier name: (identifier) @macro)] (#match? @macro "^(panic|todo|unimplemented|unreachable)$")) @bypass', handling = "block", feedback = "Return or propagate a typed error instead of using a panic-path macro." }
todo-markers = { matcher = "regex", pattern = "TODO|FIXME|HACK", handling = "block", feedback = "Resolve the unfinished-work marker before shipping." }

# Rules: path-scoped activations of the tools declared above.
[rust-general]
# tools: mutation tools that activate this rule.
tools = ["write", "edit", "apply_patch"]
# paths: globs matched against the modified file path (workspace-relative).
paths = ["*.rs", "**/*.rs"]
# loc.limit: max code lines (counted by tokei) before the file-length check fires.
# loc.handling: "advise" emits required fix feedback; "block" emits a validation failure.
loc = { limit = 500, handling = "advise" }
# tool activations: hard feedback runs at mutation time and repeats at stop.
allow-attr = { on = "tool|stop", handling = "block" }
cfg-any = { on = "tool|stop", handling = "block" }
deny-attr = { on = "tool|stop", handling = "block" }
expect-attr = { on = "tool|stop", handling = "block" }
fallible-shortcuts = { on = "tool|stop", handling = "block" }
ignore-attr = { on = "tool|stop", handling = "block" }
panic-macros = { on = "tool|stop", handling = "block" }
silent-var-rename = { on = "tool|stop", handling = "block" }
todo-markers = { on = "tool|stop", handling = "block" }
# priority: tiebreaker when LOC limits collide on one file (higher wins; default 0).

[rust-entrypoints]
# tools: mutation tools that activate this rule.
tools = ["write", "edit", "apply_patch"]
# paths: globs matched against the modified file path (workspace-relative).
paths = ["**/mod.rs", "**/lib.rs", "**/main.rs"]
# loc.limit: max code lines (counted by tokei) before the file-length check fires.
# loc.handling: "advise" emits required fix feedback; "block" emits a validation failure.
loc = { limit = 200, handling = "advise" }
# tool activations: hard feedback runs at mutation time and repeats at stop.
allow-attr = { on = "tool|stop", handling = "block" }
cfg-any = { on = "tool|stop", handling = "block" }
deny-attr = { on = "tool|stop", handling = "block" }
expect-attr = { on = "tool|stop", handling = "block" }
fallible-shortcuts = { on = "tool|stop", handling = "block" }
ignore-attr = { on = "tool|stop", handling = "block" }
panic-macros = { on = "tool|stop", handling = "block" }
silent-var-rename = { on = "tool|stop", handling = "block" }
todo-markers = { on = "tool|stop", handling = "block" }
# priority: tiebreaker when LOC limits collide on one file (higher wins; default 0).
priority = 10
