# CONVENTIONS.toml — post-mutation check configuration for Norn.
#
# Language definitions declare available tools. Rules activate those tools after
# write / edit / apply_patch mutations. `handling = "advise"` is non-blocking
# transport, not optional guidance: the agent must fix every advisory properly
# before claiming completion. `handling = "block"` emits a validation failure;
# gate-mode tools reject the call, while report-mode tools return committed
# output with a structured validation error because the mutation already landed.
# Generated by `norn init conventions`; review deliberately before broad use.

# Language definitions: bundled templates for detected source languages.
[rust.patterns]
allow-attr = { matcher = "ast", pattern = "#[allow(...)]", handling = "advise", feedback = "#[allow(...)] silences the lint without fixing the code. Address the underlying issue: propagate errors with `?`, return Result, or refactor. Do not silence." }
expect-attr = { matcher = "ast", pattern = "#[expect(...)]", handling = "advise", feedback = "#[expect(...)] is still a bypass — it silences the lint and adds a compile error when the lint stops firing. Fix the underlying lint instead of silencing it." }
cfg-any = { matcher = "ast", pattern = "#[cfg(any())]", handling = "advise", feedback = "#[cfg(any())] is a no-op predicate that disables the item entirely. Use feature-gating with a real feature flag, or remove the dead code." }
ignore-attr = { matcher = "ast", pattern = "#[ignore]", handling = "advise", feedback = "#[ignore] skips the test — fix or delete it instead. Tests that require an external service use a runtime env-var gate (`*_TEST_URL`) per project convention." }
silent-var-rename = { matcher = "ast", pattern = '(parameter pattern: (identifier) @name (#match? @name "^_[a-zA-Z]")) @bypass (let_declaration pattern: (identifier) @name (#match? @name "^_[a-zA-Z]")) @bypass', handling = "advise", feedback = "`_`-prefixed bindings require a real justification. Do not rename a variable just to silence an unused-variable lint. Use the value, change the signature or trait contract, or remove the binding. If it is genuinely intentional, document why in code." }
todo-markers = { matcher = "regex", pattern = "TODO|FIXME|HACK|unimplemented!", handling = "advise", feedback = "Resolve the TODO/FIXME/HACK/unimplemented! marker before shipping." }

[rust.diagnostics]
clippy = { target = "package", handling = "advise" }

[rust.remediation]
rustfmt = { target = "file", args = [] }

# Rules: path-scoped activations of the tools declared above.
[rust-general]
# tools: mutation tools that activate this rule.
tools = ["write", "edit", "apply_patch"]
# paths: globs matched against the modified file path (workspace-relative).
paths = ["*.rs", "**/*.rs"]
# loc.limit: max code lines (counted by tokei) before the file-length check fires.
# loc.handling: "advise" emits required fix feedback; "block" emits a validation failure.
loc = { limit = 500, handling = "advise" }
# tool activations: explicit tool names with lifecycle trigger and required-feedback handling.
allow-attr = { on = "tool", handling = "advise" }
cfg-any = { on = "tool", handling = "advise" }
clippy = { on = "tool", handling = "advise" }
expect-attr = { on = "tool", handling = "advise" }
ignore-attr = { on = "tool", handling = "advise" }
rustfmt = { on = "tool", handling = "advise" }
silent-var-rename = { on = "tool", handling = "advise" }
todo-markers = { on = "tool", handling = "advise" }
# priority: tiebreaker when LOC limits collide on one file (higher wins; default 0).

[rust-entrypoints]
# tools: mutation tools that activate this rule.
tools = ["write", "edit", "apply_patch"]
# paths: globs matched against the modified file path (workspace-relative).
paths = ["**/mod.rs", "**/lib.rs", "**/main.rs"]
# loc.limit: max code lines (counted by tokei) before the file-length check fires.
# loc.handling: "advise" emits required fix feedback; "block" emits a validation failure.
loc = { limit = 200, handling = "advise" }
# tool activations: explicit tool names with lifecycle trigger and required-feedback handling.
allow-attr = { on = "tool", handling = "advise" }
cfg-any = { on = "tool", handling = "advise" }
clippy = { on = "tool", handling = "advise" }
expect-attr = { on = "tool", handling = "advise" }
ignore-attr = { on = "tool", handling = "advise" }
rustfmt = { on = "tool", handling = "advise" }
silent-var-rename = { on = "tool", handling = "advise" }
todo-markers = { on = "tool", handling = "advise" }
# priority: tiebreaker when LOC limits collide on one file (higher wins; default 0).
priority = 10
